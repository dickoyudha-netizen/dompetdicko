<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0F6E56">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Catat">
<title>Catat Cepat</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--hijau:#1D9E75;--hijau-tua:#0F6E56;--merah:#E24B4A}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--hijau-tua);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
  padding-top:calc(20px + env(safe-area-inset-top));
  padding-bottom:calc(20px + env(safe-area-inset-bottom));
  min-height:100vh;
}
.logo{font-size:40px;margin-bottom:12px;text-align:center}
.tagline{font-size:13px;color:rgba(255,255,255,.65);margin-bottom:24px;text-align:center}
.box{
  background:white;border-radius:16px;padding:18px;
  width:100%;max-width:380px;
  box-shadow:0 8px 32px rgba(0,0,0,.25);
}
textarea{
  width:100%;border:none;outline:none;resize:none;
  font-size:18px;font-family:inherit;color:#1A1A1A;
  background:transparent;line-height:1.5;min-height:60px;max-height:140px;
}
textarea::placeholder{color:#AAAAAA;font-size:16px}
.divider{height:1px;background:#F0F0EE;margin:12px 0}
.btn-row{display:flex;gap:8px;align-items:center}
.btn-send{
  flex:1;background:var(--hijau);color:white;border:none;
  border-radius:10px;padding:13px;font-size:16px;font-weight:600;
  cursor:pointer;font-family:inherit;transition:opacity .15s,transform .1s;
}
.btn-send:active{transform:scale(.97)}
.btn-send:disabled{opacity:.4;cursor:not-allowed}
.btn-home{
  background:#F4F4F2;color:#666;border:none;border-radius:10px;
  padding:13px 16px;font-size:13px;cursor:pointer;font-family:inherit;
  white-space:nowrap;text-decoration:none;display:inline-block;line-height:1;
}
.pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px}
.pill{
  background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);
  border-radius:16px;padding:5px 11px;font-size:12px;color:rgba(255,255,255,.85);
  cursor:pointer;transition:background .12s;
}
.pill:active{background:rgba(255,255,255,.3)}
.status{
  margin-top:16px;font-size:13px;text-align:center;
  color:rgba(255,255,255,.8);min-height:20px;transition:opacity .3s;
}
.status.ok{color:#A7F3D0}
.status.err{color:#FCA5A5}
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(255,255,255,.4);border-top-color:white;
  border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;
}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="logo">&#x1F4B0;</div>
<div class="tagline">Catat langsung, selesai dalam 5 detik</div>

<div class="box">
  <textarea id="inp" rows="2" autofocus
    placeholder="Ketik transaksi... contoh: makan siang 25rb"></textarea>
  <div class="divider"></div>
  <div class="btn-row">
    <button class="btn-send" id="btn" onclick="kirim()">Catat &#x2197;</button>
    <a class="btn-home" href="index.html">&#x1F4CA; Buka App</a>
  </div>
</div>

<div class="pills">
  <span class="pill" onclick="setInp('makan siang 25rb')">makan siang 25rb</span>
  <span class="pill" onclick="setInp('bensin 50rb')">bensin 50rb</span>
  <span class="pill" onclick="setInp('gaji masuk 5jt')">gaji masuk 5jt</span>
  <span class="pill" onclick="setInp('grab 18rb')">grab 18rb</span>
  <span class="pill" onclick="setInp('kopi 30rb')">kopi 30rb</span>
</div>

<div class="status" id="status"></div>

<script>
// Ganti dengan Web App URL GAS Anda
var GAS = 'https://script.google.com/macros/s/AKfycbx-MldNeG6k_g80j3kFzh7UcLR8QEpxauVoyuvHVu8tsle8lw4_tlP0vEgJJXrS6YD2/exec';

var inp = document.getElementById('inp');
var btn = document.getElementById('btn');
var sts = document.getElementById('status');

// Auto-focus saat halaman dibuka
setTimeout(function(){ inp.focus(); }, 100);

// Enter = kirim, Shift+Enter = baris baru
inp.addEventListener('keydown', function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();kirim();}
});

// Auto-resize
inp.addEventListener('input', function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,140)+'px';
});

function setInp(t){
  inp.value=t; inp.focus();
  inp.style.height='auto';
  inp.style.height=Math.min(inp.scrollHeight,140)+'px';
}

function kirim(){
  var text=inp.value.trim();
  if(!text||btn.disabled)return;

  btn.disabled=true;
  btn.innerHTML='<span class="spinner"></span>';
  setStatus('Menyimpan...','');

  fetch(GAS+'?action=catat&text='+encodeURIComponent(text))
    .then(function(r){return r.json();})
    .then(function(j){
      if(j.ok){
        var d=j.data;
        var sign=d.jenis==='Pemasukan'?'+':'-';
        setStatus('&#x2713; Tersimpan: '+d.deskripsi+' ('+sign+fmtRp(d.nominal)+')','ok');
        inp.value='';
        inp.style.height='auto';
        // Reset status setelah 3 detik, siap catat lagi
        setTimeout(function(){setStatus('','');inp.focus();},3000);
      } else {
        setStatus('&#x26A0; '+( j.pesan||'Gagal'),'err');
      }
    })
    .catch(function(){
      setStatus('&#x274C; Tidak bisa terhubung. Cek koneksi.','err');
    })
    .finally(function(){
      btn.disabled=false;
      btn.innerHTML='Catat &#x2197;';
    });
}

function setStatus(msg,type){
  sts.innerHTML=msg;
  sts.className='status'+(type?' '+type:'');
}

function fmtRp(n){
  n=Math.abs(n||0);
  if(n>=1000000)return'Rp'+parseFloat((n/1000000).toFixed(1))+'jt';
  if(n>=1000)return'Rp'+Math.round(n/1000)+'rb';
  return'Rp'+n;
}
</script>
</body>
</html>
